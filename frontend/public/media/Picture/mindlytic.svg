<svg width="300" height="300" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gemini-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285F4" />
      <stop offset="40%" stop-color="#9b72cb" />
      <stop offset="70%" stop-color="#d96570" />
      <stop offset="100%" stop-color="#f4af42" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    @keyframes shift {
      0% { stop-color: #4285F4; }
      50% { stop-color: #d96570; }
      100% { stop-color: #4285F4; }
    }
    .letter-body {
      animation: breathe 4s ease-in-out infinite;
      transform-origin: center;
    }
    .flare {
      animation: breathe 2s ease-in-out infinite alternate;
    }
  </style>

  <rect x="10" y="10" width="80" height="80" rx="25" fill="#f8f9ff" stroke="#e0e0e0" stroke-width="0.5" />

  <text
    class="letter-body"
    x="50%"
    y="50%"
    text-anchor="middle"
    alignment-baseline="middle"
    dominant-baseline="middle"
    dy="0.04em"
    fill="url(#gemini-grad)"
    font-size="40"
    font-weight="800"
    letter-spacing="0.5"
    font-family="Space Grotesk, Segoe UI, sans-serif"
    filter="url(#glow)"
  >
    LS
  </text>

  <path class="flare" d="M85 11 C85 16 81 20 76 20 C81 20 85 24 85 29 C85 24 89 20 94 20 C89 20 85 16 85 11Z" 
        fill="#9b72cb" />
</svg>
