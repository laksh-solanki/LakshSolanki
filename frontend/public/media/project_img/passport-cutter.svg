    <rect x="310" y="170" width="360" height="400" rx="18" fill="#EEF5F8" stroke="#C8DDE4" stroke-width="4"/>
    <rect x="342" y="202" width="296" height="336" rx="12" fill="#FFFFFF"/>
    <rect x="356" y="216" width="268" height="308" rx="10" fill="url(#accent)"/>

