services:
  - type: web
    name: laksh-solanki-portfolio
    env: static
    # Use pnpm which matches the lockfile in the repo
    buildCommand: cd frontend && npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: frontend/dist
    # Rewrite ALL routes to index.html — required for Vue Router history mode
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    envVars:
      - key: VITE_BASE_URL
        value: /
      - key: NODE_ENV
        value: production
